name: CI

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: node tests/triage.test.mjs
      - run: node tests/sync-backoff.test.mjs

name: CI

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Stub env vars so Next.js build completes without real credentials.
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
      UPSTASH_REDIS_REST_TOKEN: placeholder

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --workspace=apps/web || true

      - name: Type check
        run: npm run typecheck --workspace=apps/web

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Build
        run: npm run build --workspace=apps/web

      - name: Unit tests — triage rules
        run: node tests/triage.test.mjs

      - name: Unit tests — sync backoff
        run: node tests/sync-backoff.test.mjs
